<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Conture | Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <h1>AURA CONTURE</h1>
      <ul class="nav-links">
        <li><a href="homepage.html">Home</a></li>
        <li><a href="collections.html">Products</a></li>
        <li><a href="trustees.html">Board</a></li>
        <li><a href="inquiries.html">Inquiries</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="checkout.html">Checkout</a></li>
    
      </ul>
    </nav>
  </header>

  <div class="marquee-container">
    <marquee>sp🔥 New Arrivals: Winter Collection | Limited Stock | Free Shipping over $200 🔥</marquee>
  </div>

  <main>
    <h2>Our Collections</h2>
    <div class="card-grid" id="product-list">
      <!-- Products will be loaded via JS -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Aura Conture. All rights reserved.</p>
  </footer>

  <script src="js/index.js"></script>
 
 <script>
    const products = [
      { id:1, name:'Evening Gown' , price:299,  image: 'image/image5.png '},
      { id:2, name:'Leather Jacket', price:199,  image:'image/image6.png' },
      { id:3, name:'Silk Blouse', price:89,   image:'image/image2.png' },
      { id:4, name:'Designer Heels', price:149, image:'image/image10.png' },
      { id:5, name:'Cocktail Dress', price:249, image:'image/61WR53kfNcL.png' },
      { id:6, name:'Wool Scarf', price:49, image:'image/81GON0-5gTL.png' }
    ];

    function displayProducts() {
      const container = document.getElementById('product-list');
      container.innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.image}" alt="${p.name}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <button class="btn" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "\\'")})'>Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    displayProducts();
  </script>
</body>
</html>
